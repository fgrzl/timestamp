name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read
  packages: write
  actions: write

jobs:
  BuildAndTest:
    name: Build and Test
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25'
          cache: 'mod'

      - name: Ensure dependencies
        run: go mod tidy

      - name: Build
        run: go build ./...

      - name: Run Tests
        run: go test ./... -v -race -covermode=atomic

      - name: Workflow Cleanup
        uses: fgrzl/actions/workflow-cleanup@v0.0.3
