version: 2

updates:
  # Keep Go module dependencies up to date
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "deps"
      prefix-development: "deps"
      include: "scope"
    labels:
      - "dependencies"
      - "go"
      - "automerge"
    reviewers:
      - "fgrzl"
    assignees:
      - "fgrzl"
    # Allow patch and minor updates for Go stdlib and common dependencies
    ignore:
      - dependency-name: "golang.org/x/tools"
        update-types: ["version-update:semver-major"]
      - dependency-name: "golang.org/x/sys"
        update-types: ["version-update:semver-major"]
    # Group related updates
    groups:
      golang-x:
        patterns:
          - "golang.org/x/*"
        update-types:
          - "minor"
          - "patch"
      testing:
        patterns:
          - "*testify*"
          - "*assert*"
          - "*mock*"
        update-types:
          - "minor"
          - "patch"

  # Keep GitHub Actions up to date
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
      prefix-development: "ci"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"
      - "ci"
      - "automerge"
    reviewers:
      - "fgrzl"
    assignees:
      - "fgrzl"
    # Group GitHub Actions updates
    groups:
      github-actions:
        patterns:
          - "actions/*"
        update-types:
          - "minor"
          - "patch"
      fgrzl-actions:
        patterns:
          - "fgrzl/*"
        update-types:
          - "minor"
          - "patch"
